name: lis-build-test-deploy

on:
  push: 
    branches: [ main ]
 
jobs:
  lis-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code on the repository 
        uses: actions/checkout@v4
      
      - name: Set up .NET 10.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
   
      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test with Coverage
        run: dotnet test --no-build --configuration Release --collect:"XPlat Code Coverage" --results-directory ./TestResults
      
      - name: Install ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Generate Code Coverage Report
        run: reportgenerator -reports:./TestResults/*/coverage.cobertura.xml -targetdir:./CoverageReport -reporttypes:Html
        
      - name: Upload Code Coverage Report as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-report
          path: ./CoverageReport
    
      - name: Build Docker Image
        run: docker build -t lis.app .